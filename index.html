<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日一句">
<meta name="theme-color" content="#1a1a2e">
<title>每日一句</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent-pos: #f6c90e;
    --accent-neg: #e94560;
    --text-primary: #f0ece2;
    --text-secondary: #8a8fa8;
    --border: rgba(255,255,255,0.07);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 80px;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(246,201,14,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(233,69,96,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 48px 20px 24px;
    position: relative;
    z-index: 1;
  }
  header .app-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header .date-display {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }

  /* Today's quote card */
  .today-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 28px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.3s ease;
  }
  .today-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-pos), var(--accent-neg));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .today-card .label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .today-card .label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .quote-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    line-height: 1.7;
    color: var(--text-primary);
    margin-bottom: 20px;
    min-height: 100px;
    display: flex;
    align-items: center;
  }
  .quote-text.animating {
    animation: fadeSlide 0.4s ease forwards;
  }
  @keyframes fadeSlide {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .quote-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .energy-tag {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .energy-tag.positive {
    background: rgba(246,201,14,0.12);
    color: var(--accent-pos);
    border: 1px solid rgba(246,201,14,0.2);
  }
  .energy-tag.negative {
    background: rgba(233,69,96,0.12);
    color: var(--accent-neg);
    border: 1px solid rgba(233,69,96,0.2);
  }
  .quote-index {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }
  .btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn-today {
    background: rgba(246,201,14,0.1);
    color: var(--accent-pos);
    border: 1px solid rgba(246,201,14,0.25);
  }
  .btn-today:hover { background: rgba(246,201,14,0.18); }
  .btn-random {
    background: rgba(233,69,96,0.1);
    color: var(--accent-neg);
    border: 1px solid rgba(233,69,96,0.25);
  }
  .btn-random:hover { background: rgba(233,69,96,0.18); }

  /* Section title */
  .section-title {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Quote list */
  .quote-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }
  .quote-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 16px 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: all 0.2s ease;
    animation: itemIn 0.3s ease forwards;
  }
  @keyframes itemIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .quote-item:hover { border-color: rgba(255,255,255,0.12); }
  .quote-item-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .quote-item-dot.positive { background: var(--accent-pos); }
  .quote-item-dot.negative { background: var(--accent-neg); }
  .quote-item-text {
    flex: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-primary);
  }
  .quote-item-del {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .quote-item-del:hover { color: var(--accent-neg); background: rgba(233,69,96,0.1); }
  .quote-item-del:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Add form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
  }
  .form-row {
    margin-bottom: 14px;
  }
  .form-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: block;
  }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    color: var(--text-primary);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 90px;
  }
  textarea:focus { border-color: rgba(246,201,14,0.4); }
  textarea::placeholder { color: var(--text-secondary); font-size: 14px; }

  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .toggle-btn.active.pos {
    background: rgba(246,201,14,0.12);
    color: var(--accent-pos);
    border-color: rgba(246,201,14,0.3);
  }
  .toggle-btn.active.neg {
    background: rgba(233,69,96,0.12);
    color: var(--accent-neg);
    border-color: rgba(233,69,96,0.3);
  }

  .btn-add {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(246,201,14,0.15), rgba(233,69,96,0.1));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-add:hover { background: linear-gradient(135deg, rgba(246,201,14,0.22), rgba(233,69,96,0.16)); }
  .btn-add:active { transform: scale(0.98); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,50,0.95);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    backdrop-filter: blur(10px);
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<header>
  <div class="app-name">每 日 一 句</div>
  <div class="date-display" id="dateDisplay"></div>
</header>

<div class="container">

  <!-- Today's card -->
  <div class="today-card">
    <div class="label">今日語錄</div>
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-meta">
      <span class="energy-tag" id="energyTag"></span>
      <span class="quote-index" id="quoteIndex"></span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-today" onclick="showTodayQuote()">↺ 今日語錄</button>
    <button class="btn btn-random" onclick="showRandomQuote()">✦ 再抽一句</button>
  </div>

  <!-- Quote list -->
  <div class="section-title">所有語錄</div>
  <div class="quote-list" id="quoteList"></div>

  <!-- Add form -->
  <div class="section-title">新增語錄</div>
  <div class="add-form">
    <div class="form-row">
      <label class="form-label">輸入句子</label>
      <textarea id="newQuoteInput" placeholder="寫下你想記住的一句話…" rows="3"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">能量類型</label>
      <div class="toggle-row">
        <button class="toggle-btn active pos" id="togglePos" onclick="selectEnergy('positive')">☀ 正能量</button>
        <button class="toggle-btn neg" id="toggleNeg" onclick="selectEnergy('negative')">🌑 負能量</button>
      </div>
    </div>
    <button class="btn-add" onclick="addQuote()">＋ 加入語錄庫</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const BUILT_IN = [
  { text: "每一個清晨都是重新開始的機會，別讓昨天的陰影遮住今天的陽光。", energy: "positive" },
  { text: "你比自己想像的更強大，那些沒有打倒你的，終將成為你的一部分。", energy: "positive" },
  { text: "慢慢來，比較快。真正重要的事，值得你用時間去做好。", energy: "positive" },
  { text: "不要等到準備好了才開始，開始了你才會準備好。", energy: "positive" },
  { text: "有些路只能一個人走，但走過了，風景是你自己的。", energy: "positive" },
  { text: "你願意為誰改變，那個人就是你最深的執念。", energy: "positive" },
  { text: "生命中最美的相遇，是在你最真實的樣子裡遇見對的人。", energy: "positive" },
  { text: "疲憊的時候，就讓自己停下來。休息不是放棄，而是為了走更遠。", energy: "positive" },
  { text: "有些人離開了，是為了讓你有空間，遇見更好的。", energy: "negative" },
  { text: "失去的，不代表你不值得擁有。只是時機還沒到。", energy: "negative" },
  { text: "並非所有努力都有回報，但不努力，什麼都不會有。", energy: "negative" },
  { text: "人最怕的不是失敗，而是習慣了失敗之後的平靜。", energy: "negative" },
  { text: "有些告別沒有儀式，有些結束沒有理由，那才是最難放下的。", energy: "negative" },
  { text: "孤獨不是沒有人陪，而是身邊的人都不懂你在說什麼。", energy: "negative" },
  { text: "時間不會治癒所有傷口，它只是讓你學會帶著傷繼續走。", energy: "negative" },
];

const STORAGE_KEY = 'daily_quote_custom';
let selectedEnergy = 'positive';
let currentQuote = null;

function getCustomQuotes() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}
function saveCustomQuotes(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function getAllQuotes() {
  return [...BUILT_IN, ...getCustomQuotes()];
}

function getTodayQuote() {
  const all = getAllQuotes();
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
  return all[seed % all.length];
}

function displayQuote(q, isToday = false) {
  currentQuote = q;
  const all = getAllQuotes();
  const idx = all.findIndex(i => i.text === q.text);
  const el = document.getElementById('quoteText');
  el.classList.remove('animating');
  void el.offsetWidth;
  el.classList.add('animating');
  el.textContent = q.text;
  const tag = document.getElementById('energyTag');
  tag.textContent = q.energy === 'positive' ? '☀ 正能量' : '🌑 負能量';
  tag.className = 'energy-tag ' + (q.energy === 'positive' ? 'positive' : 'negative');
  document.getElementById('quoteIndex').textContent = `#${idx + 1} / ${all.length}`;
}

function showTodayQuote() {
  displayQuote(getTodayQuote(), true);
  showToast('顯示今日語錄 ✦');
}

function showRandomQuote() {
  const all = getAllQuotes();
  let q;
  let tries = 0;
  do {
    q = all[Math.floor(Math.random() * all.length)];
    tries++;
  } while (currentQuote && q.text === currentQuote.text && tries < 10);
  displayQuote(q);
  showToast('換一句看看 ↺');
}

function renderList() {
  const list = document.getElementById('quoteList');
  list.innerHTML = '';
  const custom = getCustomQuotes();
  const all = [...BUILT_IN, ...custom];
  all.forEach((q, i) => {
    const isCustom = i >= BUILT_IN.length;
    const div = document.createElement('div');
    div.className = 'quote-item';
    div.innerHTML = `
      <div class="quote-item-dot ${q.energy}"></div>
      <div class="quote-item-text">${q.text}</div>
      <button class="quote-item-del" onclick="deleteQuote(${i})" ${isCustom ? '' : 'disabled title="內建語錄無法刪除"'}>✕</button>
    `;
    list.appendChild(div);
  });
}

function deleteQuote(globalIdx) {
  const custom = getCustomQuotes();
  const customIdx = globalIdx - BUILT_IN.length;
  if (customIdx < 0) return;
  custom.splice(customIdx, 1);
  saveCustomQuotes(custom);
  renderList();
  displayQuote(getTodayQuote(), true);
  showToast('已刪除語錄');
}

function selectEnergy(type) {
  selectedEnergy = type;
  document.getElementById('togglePos').className = 'toggle-btn' + (type === 'positive' ? ' active pos' : '');
  document.getElementById('toggleNeg').className = 'toggle-btn' + (type === 'negative' ? ' active neg' : '');
}

function addQuote() {
  const input = document.getElementById('newQuoteInput');
  const text = input.value.trim();
  if (!text) { showToast('請先輸入句子 ✎'); return; }
  if (text.length < 4) { showToast('句子太短了，再長一點吧'); return; }
  const custom = getCustomQuotes();
  const all = getAllQuotes();
  if (all.some(q => q.text === text)) { showToast('這句話已經存在囉'); return; }
  custom.push({ text, energy: selectedEnergy });
  saveCustomQuotes(custom);
  input.value = '';
  renderList();
  showToast('已加入語錄庫 ✦');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  const str = `${d.getFullYear()} · ${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} · 週${days[d.getDay()]}`;
  document.getElementById('dateDisplay').textContent = str;
}

// Init
setDate();
displayQuote(getTodayQuote(), true);
renderList();

// Enter to submit
document.getElementById('newQuoteInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.metaKey) addQuote();
});
</script>
</body>
</html>
